<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THIS IS WHERE HE IS</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --blood: #8b0000;
      --blood-bright: #d00000;
      --ash: #b9b9b9;
      --black: #030303;
      --panel: rgba(10, 10, 10, 0.82);
    }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, 'Times New Roman', serif;
      background:
        radial-gradient(circle at 50% 35%, rgba(80, 0, 0, 0.34), transparent 32%),
        radial-gradient(circle at 80% 10%, rgba(130, 0, 0, 0.18), transparent 26%),
        linear-gradient(180deg, #0b0b0b 0%, #020202 60%, #000 100%);
      color: #f2f2f2;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.025) 0px,
          rgba(255, 255, 255, 0.025) 1px,
          transparent 2px,
          transparent 5px
        );
      mix-blend-mode: overlay;
      opacity: 0.35;
      z-index: 20;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle, transparent 42%, rgba(0, 0, 0, 0.72) 100%);
      z-index: 21;
    }

    .landing {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      z-index: 10;
    }

    .landing.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .panel {
      width: min(860px, 100%);
      padding: clamp(28px, 6vw, 62px);
      border: 1px solid rgba(208, 0, 0, 0.42);
      background: linear-gradient(180deg, rgba(20, 20, 20, 0.94), rgba(0, 0, 0, 0.86));
      box-shadow: 0 0 60px rgba(139, 0, 0, 0.34), inset 0 0 80px rgba(0, 0, 0, 0.85);
      text-align: center;
    }

    .warning {
      margin: 0 0 18px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--blood-bright);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 0.82rem;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.8rem, 9vw, 6.8rem);
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 0 0 20px rgba(208, 0, 0, 0.9), 0 0 70px rgba(208, 0, 0, 0.38);
    }

    p {
      margin: 0 auto 32px;
      max-width: 620px;
      color: #c9c9c9;
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.5;
    }

    button {
      cursor: pointer;
      border: 1px solid rgba(255, 0, 0, 0.66);
      background: linear-gradient(180deg, #2b0000, #090000);
      color: #fff;
      padding: 18px 28px;
      min-width: min(100%, 540px);
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 0 28px rgba(208, 0, 0, 0.38), inset 0 0 20px rgba(255, 0, 0, 0.12);
    }

    button:hover,
    button:focus-visible {
      outline: none;
      background: linear-gradient(180deg, #510000, #120000);
      box-shadow: 0 0 42px rgba(255, 0, 0, 0.52), inset 0 0 26px rgba(255, 0, 0, 0.18);
    }

    .reveal {
      position: fixed;
      inset: 0;
      display: none;
      background: #000;
      z-index: 5;
    }

    .reveal.visible { display: block; }

    .morgen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      filter: brightness(0.48) contrast(1.32) saturate(0.52) grayscale(0.2);
      transform: scale(1.02);
    }

    .reveal::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.86), transparent 38%, rgba(0,0,0,0.78));
      z-index: 2;
      pointer-events: none;
    }

    .caption {
      position: fixed;
      left: clamp(18px, 4vw, 54px);
      right: clamp(18px, 4vw, 54px);
      bottom: clamp(18px, 5vw, 54px);
      z-index: 4;
      display: grid;
      grid-template-columns: 1fr minmax(220px, 340px);
      gap: 22px;
      align-items: end;
    }

    .statement {
      padding: 22px;
      background: var(--panel);
      border-left: 7px solid var(--blood-bright);
      box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }

    .statement h2 {
      margin: 0 0 12px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(2rem, 6vw, 5.4rem);
      line-height: 0.92;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 18px rgba(208, 0, 0, 0.85);
    }

    .coords {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 13px;
      border: 1px solid rgba(255, 0, 0, 0.58);
      background: rgba(0, 0, 0, 0.86);
      color: #ffdddd;
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(1rem, 2.4vw, 1.6rem);
      letter-spacing: 0.04em;
    }

    .map-card {
      background: rgba(0, 0, 0, 0.86);
      border: 1px solid rgba(255, 0, 0, 0.45);
      padding: 10px;
      box-shadow: 0 0 36px rgba(0,0,0,0.94);
    }

    .map-card img {
      display: block;
      width: 100%;
      height: auto;
      filter: brightness(0.72) contrast(1.25) grayscale(0.28);
    }

    .map-label {
      margin-top: 8px;
      color: var(--ash);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    @media (max-width: 820px) {
      .caption {
        grid-template-columns: 1fr;
      }

      .map-card {
        width: min(340px, 100%);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="landing" id="landing">
      <div class="panel">
        <div class="warning">location trace active</div>
        <h1>Where is Morgen?</h1>
        <p>Morgen detected.</p>
        <button id="revealButton" type="button">click here to find out where morgen is right now!</button>
      </div>
    </section>

    <section class="reveal" id="reveal" aria-live="assertive">
      <img class="morgen" src="birthday.jpeg" alt="Morgen at the revealed location" />

      <div class="caption">
        <div class="statement">
          <h2>LIVE LOCATION:</h2>
          <div class="coords">18°18′0″N 64°49′31″W</div>
        </div>

        <aside class="map-card" aria-label="Map reference">
          <img src="map.jpeg" alt="Map showing Little Saint James" />
          <div class="map-label">map reference: little saint james</div>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const button = document.getElementById('revealButton');
    const landing = document.getElementById('landing');
    const reveal = document.getElementById('reveal');

    button.addEventListener('click', async () => {
      reveal.classList.add('visible');
      landing.classList.add('hidden');

      const page = document.documentElement;
      if (page.requestFullscreen) {
        try { await page.requestFullscreen(); } catch (_) {}
      }
    });
  </script>
</body>
</html>
