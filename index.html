<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Where is Morgen?</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #8ddcff, #ffd1ec 55%, #fff0a8);
      color: #203040;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .page {
      width: min(1050px, 100%);
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      text-align: center;
    }

    .hero {
      padding: 42px 28px 34px;
      background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0));
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
      color: #6f3cc3;
    }

    p {
      margin: 0 auto 24px;
      max-width: 720px;
      font-size: 1.2rem;
      line-height: 1.5;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 18px 30px;
      font-size: 1.15rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff5fb7, #745cff);
      box-shadow: 0 10px 24px rgba(116, 92, 255, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(116, 92, 255, 0.45);
    }

    #answer {
      display: none;
      padding: 0 28px 36px;
      animation: fadeIn 0.5s ease forwards;
    }

    #answer.visible { display: block; }

    .coords {
      margin: 14px auto 28px;
      display: inline-block;
      padding: 16px 22px;
      border-radius: 18px;
      background: #fff7cc;
      border: 2px solid #ffcf55;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 800;
      color: #3a2b00;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      align-items: start;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    }

    .card h2 {
      margin: 8px 0 14px;
      font-size: 1.25rem;
      color: #6f3cc3;
    }

    img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .hero { padding-top: 32px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Where is Morgen right now?</h1>
      <p>Press the button to reveal Morgen's secret birthday location.</p>
      <button id="revealButton" type="button">click here to find out where morgen is right now!</button>
    </section>

    <section id="answer" aria-live="polite">
      <div class="coords">18°18′0″N 64°49′31″W</div>

      <div class="grid">
        <div class="card">
          <h2>Morgen's location</h2>
          <img src="birthday.jpeg" alt="Birthday party scene at Morgen's location" />
        </div>

        <div class="card">
          <h2>Map</h2>
          <img src="map.jpeg" alt="Map showing Little Saint James" />
        </div>
      </div>
    </section>
  </main>

  <script>
    const button = document.getElementById('revealButton');
    const answer = document.getElementById('answer');

    button.addEventListener('click', () => {
      answer.classList.add('visible');
      button.textContent = 'Morgen has been found!';
      answer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  </script>
</body>
</html>
