<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Where Is Morgen?</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    body {
      background:
        radial-gradient(circle at center, #1a0000 0%, #000 70%);
    }

    main {
      width: 100%;
      height: 100%;
    }

    .landing,
    .reveal {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing {
      position: relative;
      overflow: hidden;
    }

    .landing::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 0, 0, 0.04),
          rgba(255, 0, 0, 0.04) 1px,
          transparent 1px,
          transparent 3px
        );
      pointer-events: none;
    }

    .panel {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
      width: min(90%, 700px);
      border: 1px solid rgba(255, 0, 0, 0.3);
      background: rgba(0, 0, 0, 0.8);
      box-shadow:
        0 0 40px rgba(255, 0, 0, 0.15),
        inset 0 0 20px rgba(255, 0, 0, 0.08);
    }

    .warning {
      color: #ff3b3b;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-size: 0.8rem;
      margin-bottom: 24px;
      animation: pulse 1.5s infinite;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    p {
      color: #cfcfcf;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    button {
      background: #8b0000;
      color: #fff;
      border: none;
      padding: 18px 30px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.35);
    }

    button:hover {
      background: #c40000;
      transform: scale(1.04);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
    }

    .reveal {
      position: fixed;
      inset: 0;
      background: #000;
      flex-direction: column;
      display: none;
      overflow-y: auto;
      padding: 40px 20px;
    }

    .reveal.active {
      display: flex;
      animation: fadeIn 0.8s ease;
    }

    .morgen {
      width: min(95vw, 1400px);
      max-height: 72vh;
      object-fit: contain;
      border: 3px solid rgba(255, 0, 0, 0.4);
      box-shadow:
        0 0 40px rgba(255, 0, 0, 0.3),
        0 0 120px rgba(255, 0, 0, 0.15);
      margin-bottom: 30px;
    }

    .caption {
      width: min(95vw, 1200px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .statement {
      text-align: center;
    }

    .statement h2 {
      font-size: clamp(2rem, 4vw, 4rem);
      color: #ff2a2a;
      text-transform: uppercase;
      letter-spacing: 6px;
      margin-bottom: 14px;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
    }

    .coords {
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      letter-spacing: 4px;
      color: #ffffff;
    }

    .map {
      width: min(90vw, 700px);
      border: 2px solid rgba(255, 0, 0, 0.35);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.25);
    }

    @keyframes pulse {
      0% {
        opacity: 0.4;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.4;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @media (max-width: 700px) {
      .panel {
        padding: 28px;
      }

      button {
        width: 100%;
      }

      .morgen {
        max-height: 60vh;
      }

      .coords {
        line-height: 1.5;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="landing" id="landing">
      <div class="panel">
        <div class="warning">location trace active</div>

        <h1>Where is Morgen?</h1>

        <p>Morgen detected.</p>

        <button id="revealButton" type="button">
          click here to find out where morgen is right now!
        </button>
      </div>
    </section>

    <section class="reveal" id="reveal" aria-live="assertive">
      <img
        class="morgen"
        src="birthday.jpeg"
        alt="Morgen at the revealed location"
      />

      <div class="caption">
        <div class="statement">
          <h2>LIVE LOCATION:</h2>

          <div class="coords">
            18°18′0″N 64°49′31″W
          </div>
        </div>

        <img
          class="map"
          src="map.jpeg"
          alt="Tracked map location"
        />
      </div>
    </section>
  </main>

  <script>
    const button = document.getElementById("revealButton");
    const landing = document.getElementById("landing");
    const reveal = document.getElementById("reveal");

    button.addEventListener("click", () => {
      landing.style.display = "none";
      reveal.classList.add("active");

      document.documentElement.requestFullscreen?.();
    });
  </script>
</body>
</html>
